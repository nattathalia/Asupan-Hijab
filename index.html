<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asupan Hijab</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- Overlay -->
<div id="overlay"></div>

<!-- Sidebar -->
<div id="sidebar">

<div class="sidebar-header">
<h2>Kategori</h2>
</div>

<a href="#">🏠 Beranda</a>
<a href="#">🔥 Trending</a>
<a href="#">🆕 Terbaru</a>
<a href="#">🎬 Semua Video</a>
<a href="#">⭐ Favorit</a>
<a href="#">📞 Kontak</a>
<a href="#">ℹ Tentang</a>

</div>

<!-- Header -->

<header>

<button id="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="logo">

<img src="Asupan Hijab.png" alt="Asupan Hijab">

</div>

<div class="blank"></div>

</header>

<!-- Hero -->

<section class="hero">

<h1>Selamat Datang</h1>

<p>

Temukan berbagai video pilihan dengan tampilan sederhana,
cepat, nyaman digunakan di Android maupun komputer.

</p>

</section>

<!-- Search -->

<section class="search-area">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="Cari video...">

</div>

</section>

<!-- Video -->

<main>

<div id="videoContainer" class="video-grid">

<!-- Video dimuat otomatis dari script.js -->

</div>

</main>

<!-- Pagination -->

<div class="pagination">

<button id="prevBtn">

<i class="fa-solid fa-angle-left"></i>

Sebelumnya

</button>

<span id="pageInfo">

Halaman 1

</span>

<button id="nextBtn">

Berikutnya

<i class="fa-solid fa-angle-right"></i>

</button>

</div>

<!-- Footer -->

<footer>

<div class="footer-logo">

<img src="Asupan Hijab.png">

</div>

<p>

© 2026 Asupan Hijab

</p>

</footer>

<script src="script.js"></script>

<script>

const menuBtn=document.getElementById("menuBtn");

const sidebar=document.getElementById("sidebar");

const overlay=document.getElementById("overlay");

menuBtn.onclick=function(){

sidebar.classList.add("active");

overlay.classList.add("active");

}

overlay.onclick=function(){

sidebar.classList.remove("active");

overlay.classList.remove("active");

}

</script>

</body>

</html>
